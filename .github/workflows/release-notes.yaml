name: Release Notes

on:
  workflow_dispatch:
  workflow_run:
    workflows: ['Build, Test and Package']
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate:
    name: Generate release notes
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install node packages
        run: npm ci

      - name: Restore previous site from last Pages deployment
        id: restore
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p _site

          # Fetch the active Pages deployment URL
          PAGES_URL=$(gh api "repos/${{ github.repository }}/pages" --jq '.html_url // empty' 2>/dev/null || echo "")

          if [ -n "$PAGES_URL" ]; then
            # Download all existing versioned release pages
            INDEX_HTML=$(curl -sf "${PAGES_URL}index.html" || echo "")
            if [ -n "$INDEX_HTML" ]; then
              # Extract all versioned page hrefs from the index and download each
              echo "$INDEX_HTML" | grep -oP 'href="\Kv[\d.]+-[a-f0-9]{7}\.html' | sort -u | while read -r page; do
                curl -sf "${PAGES_URL}${page}" -o "_site/${page}" || true
              done
              echo "Restored previous site from ${PAGES_URL}"
            fi

            # Extract the SHA from the most recent versioned release page (by build date)
            PREV_SHA=$(for f in _site/v*-*.html; do
              [ -f "$f" ] || continue
              DATE=$(grep -oP 'Built on \K[^&<]+' "$f" | head -1)
              SHA=$(grep -oP 'meta name="release-sha" content="\K[^"]+' "$f" | head -1)
              [ -n "$DATE" ] && [ -n "$SHA" ] && echo "$DATE|$SHA"
            done | sort -t'|' -k1 | tail -1 | cut -d'|' -f2 || echo "")
            echo "prev_sha=${PREV_SHA}" >> $GITHUB_OUTPUT
          else
            echo "No previous Pages deployment found — first run"
            echo "prev_sha=" >> $GITHUB_OUTPUT
          fi

      - name: Generate coverage report
        run: npm run test:cov

      - name: Run npm audit
        id: npm_audit
        continue-on-error: true
        run: npm audit --json > npm-audit.json 2>/dev/null || true

      - name: Run Checkov security scan
        id: checkov
        continue-on-error: true
        uses: bridgecrewio/checkov-action@20fb358293b0af0188f25cf7658b69d49ec12c9a # v12.3100.0
        with:
          directory: '.'
          framework: cloudformation
          quiet: true
          skip_check: CKV_AWS_116
          output_format: json
          output_file_path: checkov-results.json

      - name: Fetch SonarCloud metrics
        id: sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          METRICS=$(curl -sf \
            -u "${SONAR_TOKEN}:" \
            "https://sonarcloud.io/api/measures/component?component=txma-audit&metricKeys=coverage,bugs,vulnerabilities,code_smells,security_hotspots,duplicated_lines_density,reliability_rating,security_rating,sqale_rating" \
            || echo '{"component":{"measures":[]}}')
          echo "metrics<<EOF" >> $GITHUB_OUTPUT
          echo "$METRICS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Collect commits since last deployment
        id: commits
        env:
          PREV_SHA: ${{ steps.restore.outputs.prev_sha }}
        run: |
          if [ -n "$PREV_SHA" ] && git cat-file -e "${PREV_SHA}^{commit}" 2>/dev/null; then
            FROM="${PREV_SHA}"
          else
            # First run — show commits from the beginning
            FROM=$(git rev-list --max-parents=0 HEAD)
          fi
          echo "from_sha=${FROM}" >> $GITHUB_OUTPUT

          JIRA_TICKETS=$(git log ${FROM}..HEAD --pretty=format:'%s' \
            | grep -oE 'DPT-[0-9]+' | sort -u | tr '\n' ',' | sed 's/,$//')
          echo "jira_tickets=${JIRA_TICKETS}" >> $GITHUB_OUTPUT

          git log ${FROM}..HEAD --pretty=format:'%H|%s|%an|%ad' --date=short \
            | node -e "
              import { readFileSync, writeFileSync } from 'fs';
              const lines = readFileSync('/dev/stdin','utf8').trim().split('\n').filter(Boolean);
              const out = lines.map(l => {
                const [hash, ...rest] = l.split('|');
                const [subject, author, date] = rest.join('|').split('|');
                return { hash: hash.slice(0,7), subject, author, date };
              });
              writeFileSync('commits.json', JSON.stringify(out));
            " || echo '[]' > commits.json

      - name: Update JIRA Fix Version
        if: steps.commits.outputs.jira_tickets != ''
        env:
          JIRA_BASE_URL: https://govukverify.atlassian.net
          JIRA_USER: ${{ secrets.JIRA_USER }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: DPT
          JIRA_TICKETS: ${{ steps.commits.outputs.jira_tickets }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          FIX_VERSION="v${PKG_VERSION}"
          if [ -z "${JIRA_USER}" ] || [ -z "${JIRA_API_TOKEN}" ]; then
            echo "::warning::JIRA credentials are not configured (JIRA_USER/JIRA_API_TOKEN) — skipping ticket updates"
            exit 0
          fi

          echo "==> Ensuring Fix Version '${FIX_VERSION}' exists in project ${JIRA_PROJECT_KEY}"
          # Get project versions and check if ours exists
          VERSIONS_JSON=$(curl -sS \
            -u "${JIRA_USER}:${JIRA_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "${JIRA_BASE_URL}/rest/api/3/project/${JIRA_PROJECT_KEY}/versions" || true)

          EXISTING=$(printf '%s' "${VERSIONS_JSON}" | node -e "
            import { readFileSync } from 'fs';
            const raw = readFileSync('/dev/stdin', 'utf8').trim();
            if (!raw) {
              process.stdout.write('');
              process.exit(0);
            }
            try {
              const vs = JSON.parse(raw);
              const found = Array.isArray(vs) ? vs.find(v => v?.name === '${FIX_VERSION}') : null;
              process.stdout.write(found?.id ? String(found.id) : '');
            } catch {
              process.stdout.write('');
            }
          ")

          if [ -z "$EXISTING" ]; then
            echo "    Creating Fix Version '${FIX_VERSION}'"
            CREATE_JSON=$(curl -sS -X POST \
              -u "${JIRA_USER}:${JIRA_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"name\":\"${FIX_VERSION}\",\"project\":\"${JIRA_PROJECT_KEY}\",\"released\":true,\"releaseDate\":\"$(date -u +%Y-%m-%d)\"}" \
              "${JIRA_BASE_URL}/rest/api/3/version" || true)

            VERSION_ID=$(printf '%s' "${CREATE_JSON}" | node -e "
              import { readFileSync } from 'fs';
              const raw = readFileSync('/dev/stdin', 'utf8').trim();
              if (!raw) {
                process.stdout.write('');
                process.exit(0);
              }
              try {
                const d = JSON.parse(raw);
                process.stdout.write(d?.id ? String(d.id) : '');
              } catch {
                process.stdout.write('');
              }
            ")
          else
            VERSION_ID="$EXISTING"
            echo "    Fix Version '${FIX_VERSION}' already exists (id: ${VERSION_ID})"
          fi

          if [ -z "$VERSION_ID" ]; then
            # Print a small response snippet to help diagnose auth/permission problems
            SNIPPET=$(printf '%s' "${CREATE_JSON:-${VERSIONS_JSON}}" | head -c 300 | tr '\n' ' ')
            [ -n "$SNIPPET" ] && echo "::notice::JIRA API response snippet: ${SNIPPET}"
            echo "::warning::Could not create or find JIRA Fix Version '${FIX_VERSION}' — skipping ticket updates"
            exit 0
          fi

          echo "==> Updating Fix Version on tickets: ${JIRA_TICKETS}"
          IFS=',' read -ra TICKETS <<< "${JIRA_TICKETS}"
          for TICKET in "${TICKETS[@]}"; do
            echo "    Updating ${TICKET}"
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
              -u "${JIRA_USER}:${JIRA_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"update\":{\"fixVersions\":[{\"add\":{\"name\":\"${FIX_VERSION}\"}}]}}" \
              "${JIRA_BASE_URL}/rest/api/3/issue/${TICKET}")
            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "      ✓ ${TICKET} updated (HTTP ${HTTP_CODE})"
            else
              echo "::warning::Failed to update ${TICKET} — HTTP ${HTTP_CODE}"
            fi
          done

      - name: Build release notes page
        env:
          VERSION: ${{ github.event.workflow_run.head_sha || github.sha }}
          RUN_URL: ${{ github.event.workflow_run.html_url || github.server_url }}
          BRANCH: ${{ github.event.workflow_run.head_branch || github.ref_name }}
          REPO: ${{ github.repository }}
          SONAR_METRICS: ${{ steps.sonar.outputs.metrics }}
          JIRA_TICKETS: ${{ steps.commits.outputs.jira_tickets }}
          PREV_SHA: ${{ steps.restore.outputs.prev_sha }}
          CHECKOV_OUTCOME: ${{ steps.checkov.outcome }}
          NPM_AUDIT_FILE: npm-audit.json
          CHECKOV_RESULTS_FILE: checkov-results.json
        run: node scripts/release-notes/generate.mjs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: generate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
