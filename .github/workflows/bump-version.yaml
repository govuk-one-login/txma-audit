name: Bump Version

on:
  push:
    branches: [main]
    paths-ignore:
      - 'package.json'
      - 'package-lock.json'

jobs:
  bump:
    name: Bump version
    # Skip if this push was made by the bot to avoid infinite loop
    if: "${{ !startsWith(github.event.head_commit.message, 'chore: bump version') }}"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Check out repository code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: npm

      - name: Determine bump type and increment version
        id: bump
        run: |
          COMMIT_SHA="${{ github.sha }}"

          # Scan all commit messages in this push for the highest bump indicator.
          # Precedence: major > minor > patch (default)
          BUMP_TYPE="patch"
          while IFS= read -r msg; do
            if echo "$msg" | grep -qiE '\[major\]'; then
              BUMP_TYPE="major"
              break
            elif echo "$msg" | grep -qiE '\[minor\]'; then
              BUMP_TYPE="minor"
            fi
          done < <(git log '${{ github.event.before }}'..'${{ github.sha }}' --pretty=format:'%s')

          NEW_VERSION=$(npm version "${BUMP_TYPE}" --no-git-tag-version)
          NEW_VERSION="${NEW_VERSION#v}"

          node -e "
            import { readFileSync, writeFileSync } from 'fs';
            const pkg = JSON.parse(readFileSync('package.json', 'utf8'));
            pkg.commitSha = process.env.COMMIT_SHA;
            writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "bump_type=${BUMP_TYPE}" >> $GITHUB_OUTPUT
          echo "commit_sha=${COMMIT_SHA}" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }} (${{ steps.bump.outputs.bump_type }}) [${{ steps.bump.outputs.commit_sha }}]"
          git push
        env:
          COMMIT_SHA: ${{ github.sha }}
